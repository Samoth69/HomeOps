apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: ${APP}
spec:
  kanidmRef:
    name: kanidm-cluster
    namespace: security
  
  displayname: ${KANIDM_DISPLAYNAME:=${APP}}
  
  origin: https://${KANIDM_ORIGIN:=${APP}}.${SECRET_DOMAIN}

  redirectUrl:
    - https://${KANIDM_ORIGIN:=${APP}}.${SECRET_DOMAIN}${KANIDM_REDIRECT_PATH}
  
  public: false

  preferShortUsername: true

  scopeMap:
    - group: users
      scopes:
        - groups
        - openid
        - profile
        - email

  secretRotation:
    enabled: ${KANIDM_SECRET_ROTATION:=true}
    periodDays: 7