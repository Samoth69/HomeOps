---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-${APP}
spec:
  # TODO renew password automatically (need label cnpg.io/reload: "true" to be forwarded)
  refreshPolicy: CreatedOnce
  target:
    name: postgres-user-${APP}
    template:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "database"
      data:
        username: ${APP}
        password: "{{ .password }}"
        pgpass: "pooler-rw.database.svc.cluster.local:5432:${APP}:${APP}:{{ .password }}"
        jdbc-uri: "jdbc:postgresql://pooler-rw.database.svc.cluster.local:5432/${APP}?password={{ .password }}&user=${APP}"
        uri: "postgresql://${APP}:{{ .password }}@pooler-rw.database.svc.cluster.local:5432/${APP}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: generator-postgres-${APP}