---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/pooler_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-transaction-rw
spec:
  cluster:
    name: postgres

  template:
    metadata:
      labels:
        ingress.samoth.eu/envoy-internal: allow
        ingress.samoth.eu/vmagent: allow
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 512Mi

  instances: 3
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "10"
      # Required by authelia https://stackoverflow.com/a/71798410
      ignore_startup_parameters: "search_path"
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &name pooler-transaction-rw
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: *name
  podMetricsEndpoints:
    - port: metrics