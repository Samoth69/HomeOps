---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
spec:
  interval: 1h
  url: https://charts.external-secrets.io
  timeout: 3m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  values:
    global:
      podLabels:
        ingress.samoth.eu/vmagent: allow
        ingress.samoth.eu/kube-apiserver: allow
        egress.samoth.eu/kube-apiserver: allow
    replicaCount: 2
    leaderElect: true
    image:
      repository: ghcr.io/external-secrets/external-secrets
    installCRDs: true
    extendedMetricLabels: true
    log:
      level: info
      timeEncoding: iso8601
    podDisruptionBudget:
      enabled: true
    serviceMonitor:
      enabled: true
      interval: 1m
    resources: &resources
      requests:
        cpu: 1m
        memory: 45Mi
      limits:
        memory: 256Mi
    certController:
      image:
        repository: ghcr.io/external-secrets/external-secrets
      serviceMonitor:
        enabled: true
        interval: 1m
      log:
        level: info
        timeEncoding: iso8601
      resources: *resources
    webhook:
      image:
        repository: ghcr.io/external-secrets/external-secrets
      serviceMonitor:
        enabled: true
        interval: 1m
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
      log:
        level: info
        timeEncoding: iso8601
      resources: *resources
    grafanaDashboard:
      enabled: true