---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-internal
spec:
  ipFamily: DualStack
  logging:
    level:
      default: warn
  provider:
    type: Kubernetes
    kubernetes:
      envoyPDB:
        minAvailable: 1
      # TODO figure out why envoy try to fetch a access_log schema from googleapis.com...
      envoyDeployment:
        replicas: 2
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.39.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
            limits:
              memory: 400Mi
        pod:
          labels:
            ingress.samoth.eu/envoy-internal: allow
            ingress.samoth.eu/lan: allow
            ingress.samoth.eu/vmagent: allow
            egress.samoth.eu/envoy-internal: allow
      envoyService:
        annotations:
          lbipam.cilium.io/ips: "${SECRET_LB_IPV4},${SECRET_LB_IPV6}"
          lbipam.cilium.io/sharing-key: "internal-ingress"
        # Must be cluster when L2 Aware LB are enabled
        externalTrafficPolicy: Cluster
  shutdown:
    drainTimeout: 30s
  telemetry:
    metrics:
      enableRequestResponseSizesStats: true
      enableVirtualHostStats: true
      prometheus:
        compression:
          type: Gzip
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/operator.victoriametrics.com/vmpodscrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: envoy-internal
spec:
  podMetricsEndpoints:
    - port: metrics
      scheme: http
      path: /stats/prometheus
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: envoy-internal
