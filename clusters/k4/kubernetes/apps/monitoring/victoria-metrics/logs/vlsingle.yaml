---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/operator.victoriametrics.com/vlsingle_v1.json
apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: vl
spec:
  extraArgs:
    enableTCP6: "true"
  retentionPeriod: 30d
  retentionMaxDiskSpaceUsageBytes: 20GB
  priorityClassName: monitoring
  podMetadata:
    labels:
      ingress.samoth.eu/envoy-internal: allow
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 3Gi
  useStrictSecurity: true