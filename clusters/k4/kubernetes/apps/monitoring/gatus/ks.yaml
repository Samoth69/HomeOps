# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gatus
spec:
  components:
    - ../../../../components/database
  dependsOn:
    - name: postgres-cnpg
      namespace: database
  interval: 30m
  path: ./clusters/k4/kubernetes/apps/monitoring/gatus/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
  prune: true
  targetNamespace: monitoring
