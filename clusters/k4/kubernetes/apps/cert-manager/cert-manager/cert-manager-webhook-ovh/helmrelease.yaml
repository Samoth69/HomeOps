---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager-webhook-ovh
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.9.9
  url: oci://ghcr.io/aureq/charts/cert-manager-webhook-ovh
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-ovh
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager-webhook-ovh
  interval: 30m
  values:
    groupName: acme.${SECRET_DOMAIN}
    issuers:
      - name: letsencrypt-production
        create: true
        kind: ClusterIssuer
        acmeServerUrl: https://acme-v02.api.letsencrypt.org/directory
        email: ${SECRET_EMAIL}
        ovhEndpointName: ovh-eu
        ovhAuthenticationMethod: application
        ovhAuthenticationRef:
          applicationKeyRef:
            name: ovh-issuer-secret
            key: applicationKey
          applicationSecretRef:
            name: ovh-issuer-secret
            key: applicationSecret
          applicationConsumerKeyRef:
            name: ovh-issuer-secret
            key: consumerKey
        profile: shortlived
      - name: letsencrypt-staging
        create: true
        kind: ClusterIssuer
        acmeServerUrl: https://acme-staging-v02.api.letsencrypt.org/directory
        email: ${SECRET_EMAIL}
        ovhEndpointName: ovh-eu
        ovhAuthenticationMethod: application
        ovhAuthenticationRef:
          applicationKeyRef:
            name: ovh-issuer-secret
            key: applicationKey
          applicationSecretRef:
            name: ovh-issuer-secret
            key: applicationSecret
          applicationConsumerKeyRef:
            name: ovh-issuer-secret
            key: consumerKey
        profile: shortlived
    pod:
      annotations:
        reloader.stakater.com/auto: "true"
      securityContext:
        pod:
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile: { type: "RuntimeDefault" }
        container:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
          readOnlyRootFilesystem: true
