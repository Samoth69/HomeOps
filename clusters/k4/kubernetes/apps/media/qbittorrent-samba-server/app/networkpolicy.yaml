# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: qbittorrent-samba-server
spec:
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""
  ingress:
    - fromCIDRSet:
        - cidrGroupRef: group-lan
      toPorts:
        - ports:
            - port: "445"
              protocol: TCP
            - port: "445"
              protocol: UDP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: &app qbittorrent-samba-server
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/instance: *app
  ingress:
    - fromCIDRSet:
        - cidrGroupRef: group-lan
      toPorts:
        - ports:
            - port: "445"
              protocol: TCP
            - port: "445"
              protocol: UDP