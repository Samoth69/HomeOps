---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: qui
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qui
spec:
  chartRef:
    kind: OCIRepository
    name: qui
  interval: 1h
  values:
    controllers:
      qui:
        containers:
          app:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.15.0
            env:
              TZ: Europe/Paris
              QUI__HOST: 0.0.0.0
              QUI__PORT: &port 80
              QUI__LOG_LEVEL: INFO

              QUI__OIDC_ENABLED: "true"
              QUI__OIDC_ISSUER: https://authentik.${SECRET_DOMAIN}/application/o/${APP}
              QUI__OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: qui-oidc-secret
                    key: client-id
              QUI__OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: qui-oidc-secret
                    key: client-secret
              QUI__OIDC_REDIRECT_URL: https://${APP}.${SECRET_DOMAIN}/api/auth/oidc/callback
              QUI__OIDC_DISABLE_BUILT_IN_LOGIN: "true"
              QUI__CORS_ALLOWED_ORIGINS: https://${APP}.${SECRET_DOMAIN}
              QUI__CHECK_FOR_UPDATES: "false"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    
    defaultPodOptions:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        ingress.samoth.eu/envoy-internal: allow
        egress.samoth.eu/envoy-internal: allow
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    
    service:
      app:
        ports:
          http:
            port: *port
    
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"