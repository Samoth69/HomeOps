---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./password.yaml
configMapGenerator:
  - name: qbittorrent-coredns
    files:
      - ./config/Corefile
  - name: qbt-port-sync-script
    files:
      - ./config/script.sh
configurations:
  - ./config/kustomizeconfig.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled