---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app autobrr
spec:
  components:
    - ../../../../components/oauth2
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: storage
  path: ./clusters/k4/kubernetes/apps/media/autobrr/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      KANIDM_REDIRECT_PATH: /api/auth/oidc/callback
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: media
  targetNamespace: media
