---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    autoDirectNodeRoutes: true
    bandwidthManager:
      enabled: true
      bbr: true
    bpf:
      datapathMode: netkit
      masquerade: true
      distributedLRU:
        enabled: true
      policyMapMax: 40960
      preallocateMaps: true
    bpfClockProbe: true
    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    devices: bond0
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
    endpointRoutes:
      enabled: true
    envoy:
      enabled: false
    gatewayAPI:
      enabled: false
    hostFirewall:
      enabled: true
    hubble:
      enabled: true
      eventBufferCapacity: "16383"
      metrics:
        enabled:
          - dns:query;ignoreAAAA;sourceContext=workload|pod|dns|ip
          - drop:sourceContext=workload|pod|dns|ip;destinationContext=workload|pod|dns|ip;labelsContext=source_workload_kind,destination_workload_kind
          - flow:sourceContext=workload|pod|dns|ip;destinationContext=workload|pod|dns|ip;labelsContext=source_workload_kind,destination_workload_kind
          - flows-to-world:any-drop;port;syn-only;sourceContext=workload|pod|dns|ip;destinationContext=dns|ip;labelsContext=source_workload_kind
          - port-distribution:protocol;port;sourceContext=workload|pod|dns|ip;destinationContext=dns|ip;labelsContext=source_workload_kind,destination_workload_kind
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true
          annotations:
            grafana_folder: Cilium
      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: true
        resources:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            memory: 512Mi
    ipam:
      mode: kubernetes
    ipv4NativeRoutingCIDR: "10.48.0.0/16"
    ipv6NativeRoutingCIDR: "fd00:48::/104"
    ipv6:
      enabled: true
    k8sClientRateLimit:
      qps: 100
      burst: 300
    k8sServiceHost: localhost
    k8sServicePort: 6443
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: true
      leaseDuration: 3s
      leaseRenewDeadline: 1s
      leaseRetryPeriod: 500ms
    loadBalancer:
      standalone: true
      algorithm: maglev
      mode: snat
    localRedirectPolicies:
      enabled: true
    operator:
      dashboards:
        enabled: true
        annotations:
          grafana_folder: Cilium
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        maxUnavailable: null
      replicas: 2
      resources:
        requests:
          cpu: 5m
          memory: 100Mi
        limits:
          memory: 1G
      rollOutPods: true

    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
    resources:
      requests:
        cpu: 100m
        memory: 1500Mi
      limits:
        memory: 4G
    rollOutCiliumPods: false
    routingMode: native
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    socketLB:
      enabled: true
      hostNamespaceOnly: true
