# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: labelled-allow-egress-talos-api
spec:
  endpointSelector:
    matchLabels:
      egress.samoth.eu/talos-api: allow
  egress:
    - toEntities:
      - host
      - remote-node
      toPorts:
        - ports:
            - port: "50000"
              protocol: TCP
            - port: "50000"
              protocol: UDP
