---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  values:
    serviceMonitor:
      create: true
    web:
      networkPolicy:
        create: false
    commonLabels:
      ingress.samoth.eu/vmagent: allow
      ingress.samoth.eu/kube-apiserver: allow
      egress.samoth.eu/kube-apiserver: allow
      egress.samoth.eu/internet-http: allow
    resources:
      requests:
        cpu: 5m
        memory: 256Mi
      limits:
        cpu: ~
        memory: 1Gi