# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1beta1.json
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: kanidm-cluster
  labels:
    kanidm.kaniop.rs/cluster: kanidm-cluster
spec:
  hostnames:
    - idm.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - kind: Service
          name: kanidm-cluster
          port: 8443
      matches:
        - path:
            type: PathPrefix
            value: /
      sessionPersistence:
        sessionName: kanidm-session
        type: Cookie
        cookieConfig:
          lifetimeType: Session
