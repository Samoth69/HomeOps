# yaml-language-server: $schema=
apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: kanidm-cluster
spec:
  domain: &domain idm.${SECRET_DOMAIN}
  origin: https://idm.${SECRET_DOMAIN}
  replicaGroups:
    - name: default
      replicas: 2
      primaryNode: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  kanidm.kaniop.rs/cluster: kanidm-cluster
                  kanidm.kaniop.rs/replica-group: default
              topologyKey: kubernetes.io/hostname
      statefulSetAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 10m
          memory: 128M
        limits:
          memory: 128M
  
  initContainers:
    - name: kanidm-generate-replication-config
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
  containers:
    - name: kanidm
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
  image: kanidm/server:1.10.3
  imagePullPolicy: IfNotPresent
  logLevel: info
  automountServiceAccountToken: false
  securityContext:
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true
    fsGroup: 999
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile:
      type: RuntimeDefault
  gateway:
    hostnames:
      - *domain
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 128Mi
  