# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/backendtlspolicy_v1alpha3.json
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: kanidm
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: kanidm-cluster
      sectionName: https
  validation:
    caCertificateRefs:
      - name: kanidm-cluster-tls
        group: ""
        kind: Secret
    hostname: idm.${SECRET_DOMAIN}
