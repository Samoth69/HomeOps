# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app lldap
spec:
  components:
    - ../../../../components/database
  dependsOn:
    - name: postgres-cnpg
      namespace: database
  path: ./clusters/k4/kubernetes/apps/security/lldap/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
  targetNamespace: security
