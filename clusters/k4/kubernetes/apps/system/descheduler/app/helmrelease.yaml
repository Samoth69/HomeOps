---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: descheduler
  namespace: system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/descheduler
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 30m
  chart:
    spec:
      chart: descheduler
      version: 0.35.1
      sourceRef:
        kind: HelmRepository
        name: descheduler
  values:
    replicas: 2
    kind: Deployment
    podLabels:
      ingress.samoth.eu/vmagent: allow
      ingress.samoth.eu/kube-apiserver: allow
      egress.samoth.eu/kube-apiserver: allow
    resources:
      requests:
        cpu: 5m
        memory: 80Mi
      limits:
        memory: 512Mi
    cmdOptions:
      v: 3
    deschedulerPolicyAPIVersion: descheduler/v1alpha2
    deschedulerPolicy:
      profiles:
        - name: Default
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
                podProtections:
                  extraEnabled:
                  - PodsWithPVC
                  config:
                    PodsWithPVC:
                      protectedStorageClasses:
                      - name: openebs-hostpath
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingNodeTaints
            - name: RemovePodsViolatingTopologySpreadConstraint
              args:
                constraints:
                  - DoNotSchedule
                  - ScheduleAnyway
            - name: HighNodeUtilization
              args:
                thresholds:
                  cpu: 90
                  memory: 90
                  pods: 80
                evictableNamespaces:
                  exclude: &excludedNamespaces
                    - games
                    - jobs
            - name: RemoveFailedPods
              args:
                reasons:
                  - Completed
                  - ContainerStatusUnknown
                  - Error
                includingInitContainers: true
                excludeOwnerKinds:
                  - "Job"
                minPodLifetimeSeconds: 300
                namespaces:
                  exclude: *excludedNamespaces
          plugins:
            balance:
              enabled:
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
                - HighNodeUtilization
            deschedule:
              enabled:
                - RemoveFailedPods
                - RemovePodsViolatingInterPodAntiAffinity
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingNodeTaints
    service:
      enabled: true
    serviceMonitor:
      enabled: true
    leaderElection:
      enabled: true
