customization:
  extraKernelArgs:
    - sysctl.net.ipv6.conf.default.autoconf=0
    - sysctl.net.ipv6.conf.default.accept_ra=0
    - sysctl.net.ipv6.conf.all.autoconf=0
    - sysctl.net.ipv6.conf.all.accept_ra=0
    - initcall_blacklist=algif_aead_init,esp4,esp6,rxrpc # https://copy.fail & Dirty Frag
  systemExtensions:
    officialExtensions:
      - siderolabs/btrfs
      - siderolabs/kata-containers
      - siderolabs/qemu-guest-agent
      - siderolabs/util-linux-tools
  secureboot:
    includeWellKnownCertificates: true
  bootloader: sd-boot
