#-----------------------
# OH MY ZSH
#-----------------------

oh_my_zsh_theme: intheloop

# Default plugins
oh_my_zsh_plugins:
  - git
  - docker
  - docker-compose

# Whether to install by default for all specified users.
# May be overridden by `oh_my_zsh: install:` under each user.
oh_my_zsh_install: yes

# User configuration
# Important: oh-my-zsh is installed per user so you need to specify the users to install it for.
users:
  - username: thomas
  - username: root

#-----------------------
# Network config
#-----------------------
network_conn_name: "{{ansible_default_ipv4.alias}}"
ipv4_addresses: []
ipv4_gateway: 192.168.0.1
ipv4_dns:
  - 192.168.0.2
  - 192.168.0.3
ipv4_domains: []
ipv4_routes: []

ipv6_addresses: []
ipv6_gateway: fe80::2266:cfff:fe83:760a
ipv6_dns:
  - 2a01:e0a:5c9:f0a0::2
  - 2a01:e0a:5c9:f0a0::3
ipv6_domains: []
ipv6_routes: []

#-----------------------
# HomeOps
#-----------------------
homeops_root: ../..