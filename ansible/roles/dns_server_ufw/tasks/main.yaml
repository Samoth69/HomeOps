- name: config ufw - allow ports
  ufw:
    rule: allow
    port: "{{item.port}}"
    proto: "{{item.proto}}"
    comment: pihole
  with_items:
    - {"port": 53, "proto": "tcp"}
    - {"port": 53, "proto": "udp"}
    - {"port": 123, "proto": "udp"}
    - {"port": 443, "proto": "tcp"}
    - {"port": 443, "proto": "udp"}

- name: config ufw - tailscale forwarding
  ufw:
    rule: allow
    route: true
    interface_in: tailscale0
    interface_out: "{{ ansible_facts['default_ipv4']['interface'] }}"
    comment: tailscale

- name: copy after.rules
  copy:
    src: after.rules
    dest: /etc/ufw/after.rules
  notify: restart ufw